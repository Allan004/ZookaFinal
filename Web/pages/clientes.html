          <a class="navbar-brand" href="#">
            <img src="/Assets/logo.png" alt="LogoZooka">
          </a>
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="/index.html">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/pages/pets.html">Pets</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/pages/vendas.html">Vendas</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/pages/agendamento.html">Agendamento</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/pages/clientes.html">Clientes</a>
            </li>
          </ul>
          <form class="d-flex" role="search">
            <input class="form-control me-2" type="search" placeholder="Pesquisar">
            <button class="btnPesquisar" type="submit">
              <img src="/Assets/lupa.png" alt="lupa">
            </button>
          </form>
        </div>
      </div>

  </header>
  <div class="container mt-4 d-flex justify-content-center">
    <input type="text" class="cliente-pesquisar" placeholder="Pesquisar cliente">
  </div>
  <div class="container mt-5">
    <form>
      <div class="row">
        <div class="col-md-4 mb-3">
          <label>First name</label>
          <input type="text" class="form-control" placeholder="First name">
        </div>
        <div class="col-md-4 mb-3">
          <label>Last name</label>
          <input type="text" class="form-control" placeholder="Last name">
        </div>
        <div class="col-md-4 mb-3">
          <label>Username</label>
          <div class="input-group">
            <span class="input-group-text">@</span>
            <input type="text" class="form-control" placeholder="Username">
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label>City</label>
          <input type="text" class="form-control" placeholder="City">
        </div>
        <div class="col-md-3 mb-3">
          <label>State</label>
          <input type="text" class="form-control" placeholder="State">
        </div>
        <div class="col-md-3 mb-3">
          <label>Zip</label>
          <input type="text" class="form-control" placeholder="Zip">
        </div>
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">
          Agree to terms and conditions
        </label>
      </div>
      <button class="btn btn-primary" type="submit">
        Submit form
      </button>
    </form>

      <section class="mb-4">

        <a class="btn btn-link btn-floating btn-lg m-1" href="#">

        <a class="btn btn-link btn-floating btn-lg m-1" href="#">

        </a>
        <a class="btn btn-link btn-floating btn-lg m-1" href="#">
